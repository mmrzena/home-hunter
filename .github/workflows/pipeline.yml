# Runs the ingest pipeline against the cloud DB (Neon). The worker can't live on
# Vercel (long jobs + sharp), so it runs here: nightly + on-demand.
#
# Setup: add a repo secret DATABASE_URL = your Neon pooled connection string
# (Settings → Secrets and variables → Actions). PostGIS lives in Neon, so this
# job only needs Node + network.
name: pipeline

on:
  schedule:
    - cron: "17 4 * * *" # ~06:17 Prague (UTC+2 summer / 05:17 winter); odd minute dodges GitHub's top-of-hour scheduler congestion
  workflow_dispatch: {} # manual "Run workflow" button

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # Three sources × thousands of listings + per-row Neon round-trips run well
    # past an hour; give it room (the job exits as soon as the pipeline is done).
    timeout-minutes: 180
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # A touch faster than the 1200 ms local default — still polite for a
      # once-nightly job, and trims a big chunk off the paced ingest.
      REQUEST_DELAY_MS: "700"
      # Optional: cap pages per region per source if a run still runs long.
      # INGEST_MAX_PAGES: "40"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:migrate
      - run: npm run pipeline
